<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Connection Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .test-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #333;
            margin-top: 0;
            font-size: 1.8rem;
        }

        .status {
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
            font-weight: 500;
        }

        .status.loading {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        pre {
            background: #f4f4f4;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.9rem;
        }

        .test-section {
            margin: 1.5rem 0;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .test-section h3 {
            margin-top: 0;
            color: #667eea;
        }
    </style>
</head>

<body>
    <div class="test-container">
        <h1>🔗 Backend Connection Test</h1>
        <p>This page tests the connection between your frontend and backend API.</p>

        <div class="test-section">
            <h3>Test 1: Basic API Connection</h3>
            <button onclick="testBasicConnection()">Test Connection</button>
            <div id="basicStatus"></div>
        </div>

        <div class="test-section">
            <h3>Test 2: Prediction Endpoint</h3>
            <button onclick="testPrediction()">Test Prediction</button>
            <div id="predictionStatus"></div>
        </div>

        <div class="test-section">
            <h3>Test 3: Wearable Stream</h3>
            <button onclick="testWearable()">Test Wearable Data</button>
            <div id="wearableStatus"></div>
        </div>

        <div class="test-section">
            <h3>Test 4: Fusion Analysis</h3>
            <button onclick="testFusionAnalysis()">Test Fusion</button>
            <div id="fusionStatus"></div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://127.0.0.1:8000';

        async function testBasicConnection() {
            const statusDiv = document.getElementById('basicStatus');
            statusDiv.innerHTML = '<div class="status loading">Testing connection...</div>';

            try {
                const response = await fetch(`${API_BASE_URL}/`);
                const data = await response.json();

                statusDiv.innerHTML = `
                    <div class="status success">
                        ✅ Connection successful!
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                statusDiv.innerHTML = `
                    <div class="status error">
                        ❌ Connection failed: ${error.message}
                        <br><br>
                        Make sure the backend server is running at ${API_BASE_URL}
                    </div>
                `;
            }
        }

        async function testPrediction() {
            const statusDiv = document.getElementById('predictionStatus');
            statusDiv.innerHTML = '<div class="status loading">Testing prediction endpoint...</div>';

            const testData = {
                HighBP: 1,
                HighChol: 1,
                BMI: 28.5,
                Smoker: 0,
                Stroke: 0,
                HeartDiseaseorAttack: 0,
                PhysActivity: 1,
                Fruits: 1,
                Veggies: 1,
                HvyAlcoholConsump: 0,
                AnyHealthcare: 1,
                NoDocbcCost: 0,
                GenHlth: 3,
                MentHlth: 5,
                PhysHlth: 0,
                DiffWalk: 0,
                Sex: 1,
                Age: 8,
                Education: 5,
                Income: 7
            };

            try {
                const response = await fetch(`${API_BASE_URL}/predict`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(testData)
                });

                const data = await response.json();

                statusDiv.innerHTML = `
                    <div class="status success">
                        ✅ Prediction successful!
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                statusDiv.innerHTML = `
                    <div class="status error">
                        ❌ Prediction failed: ${error.message}
                    </div>
                `;
            }
        }

        async function testWearable() {
            const statusDiv = document.getElementById('wearableStatus');
            statusDiv.innerHTML = '<div class="status loading">Testing wearable stream...</div>';

            try {
                const response = await fetch(`${API_BASE_URL}/wearable/stream?patient_id=test_patient`);
                const data = await response.json();

                statusDiv.innerHTML = `
                    <div class="status success">
                        ✅ Wearable data retrieved!
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                statusDiv.innerHTML = `
                    <div class="status error">
                        ❌ Wearable test failed: ${error.message}
                    </div>
                `;
            }
        }

        async function testFusionAnalysis() {
            const statusDiv = document.getElementById('fusionStatus');
            statusDiv.innerHTML = '<div class="status loading">Testing fusion analysis...</div>';

            const testData = {
                HighBP: 1,
                HighChol: 1,
                BMI: 28.5,
                Smoker: 0,
                Stroke: 0,
                HeartDiseaseorAttack: 0,
                PhysActivity: 1,
                Fruits: 1,
                Veggies: 1,
                HvyAlcoholConsump: 0,
                AnyHealthcare: 1,
                NoDocbcCost: 0,
                GenHlth: 3,
                MentHlth: 5,
                PhysHlth: 0,
                DiffWalk: 0,
                Sex: 1,
                Age: 8,
                Education: 5,
                Income: 7
            };

            try {
                const response = await fetch(`${API_BASE_URL}/aura/analyze`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(testData)
                });

                const data = await response.json();

                statusDiv.innerHTML = `
                    <div class="status success">
                        ✅ Fusion analysis successful!
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                statusDiv.innerHTML = `
                    <div class="status error">
                        ❌ Fusion analysis failed: ${error.message}
                    </div>
                `;
            }
        }

        // Auto-test on load
        window.addEventListener('load', () => {
            setTimeout(testBasicConnection, 500);
        });
    </script>
</body>

</html>
